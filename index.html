<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задание 3 — Анкета</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .form-container {
            background: white;
            padding: 25px 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            color: #555;
        }
        input[type="text"],
        input[type="tel"],
        input[type="email"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .radio-group, .checkbox-group {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 5px;
        }
        .radio-group label, .checkbox-group label {
            font-weight: normal;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin: 0;
        }
        .lang-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 5px;
        }
        .lang-group label {
            font-weight: normal;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            width: auto;
            margin: 0;
        }
        button {
            background-color: #007BFF;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        hr {
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Анкета программиста</h2>
        <form action="#" method="post">
            <!-- 1. ФИО -->
            <label for="fio">ФИО:</label>
            <input type="text" id="fio" name="fio" placeholder="Иванов Иван Иванович" required>

            <!-- 2. Телефон -->
            <label for="phone">Телефон:</label>
            <input type="tel" id="phone" name="phone" placeholder="+7 (999) 123-45-67" required>

            <!-- 3. E-mail -->
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="example@mail.com" required>

            <!-- 4. Дата рождения -->
            <label for="birthdate">Дата рождения:</label>
            <input type="date" id="birthdate" name="birthdate" required>

            <!-- 5. Пол (радиокнопки) -->
            <label>Пол:</label>
            <div class="radio-group">
                <label><input type="radio" name="gender" value="male" required> Мужской</label>
                <label><input type="radio" name="gender" value="female"> Женский</label>
                <label><input type="radio" name="gender" value="other"> Другой</label>
            </div>

            <!-- 6. Любимые языки программирования (множественный выбор) -->
            <label>Любимые языки программирования:</label>
            <div class="lang-group">
                <label><input type="checkbox" name="lang[]" value="Pascal"> Pascal</label>
                <label><input type="checkbox" name="lang[]" value="C"> C</label>
                <label><input type="checkbox" name="lang[]"
